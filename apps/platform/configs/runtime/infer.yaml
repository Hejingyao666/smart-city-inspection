# ODPlatform 推理配置文件 (infer.yaml)
# D5 配置层: YOLO predict 参数 + 模型/源路径

# ── 任务类型 ───────────────────────────────────────────────────
task: detect                    # detect / segment / classify / pose / obb

# ── 模型 ───────────────────────────────────────────────────────
model: yolo11n.pt               # 模型文件名 (best.pt / yolo11n.pt / yolov8n.pt)
# model: best.pt               # 自定义训练模型

# ── 输入源 ─────────────────────────────────────────────────────
source: 0                       # 输入源:
                                #   - 摄像头索引: 0, 1, 2, ...
                                #   - 视频文件: demo.mp4
                                #   - 图片文件: image.jpg
                                #   - 图片文件夹: ./images/
                                #   - RTSP 流: rtsp://192.168.1.100:554/stream

# ── 推理参数 ───────────────────────────────────────────────────
conf: 0.25                      # 置信度阈值 (0~1)
iou: 0.45                       # NMS IoU 阈值 (0~1)
imgsz: 640                      # 推理输入尺寸
max_det: 100                    # 单图最大检测数
# classes: [0, 1, 2]           # 只保留这些类别 ID (可选)

# ── 设备 ───────────────────────────────────────────────────────
device: cpu                     # cpu / 0 / 0,1 / mps
# device: 0                    # GPU

# ── 批处理 ─────────────────────────────────────────────────────
batch: 16                       # 批大小 (视频/图片夹)

# ── 显示 / 存盘 ───────────────────────────────────────────────
show: false                     # 弹窗显示画面
save: true                      # 结果存盘

# ── 实验名称 ───────────────────────────────────────────────────
experiment_name: predict        # 输出子目录名 (重复自增: predict / predict2 / ...)
exist_ok: false                 # 允许覆盖同名目录

# ── 其他 ───────────────────────────────────────────────────────
agnostic_nms: false             # 类别无关 NMS
augment: false                  # 增强推理
retina_masks: false            # 高分辨率 mask (segment 任务)